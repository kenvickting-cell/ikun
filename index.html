<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>赔率计算器</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    max-width:400px;
    margin:auto;
    padding:20px;
}

input, button{
    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;
    font-size:18px;
}

button{
    background:#f5c542;
    border:none;
}

</style>
</head>

<body>

<h2>赔率计算器</h2>

<input id="o1" placeholder="赔率1">
<input id="o2" placeholder="赔率2">
<input id="o3" placeholder="赔率3">

<button onclick="calculate()">
一键计算
</button>

<div id="result"></div>

<script>

function calculate(){

let a = Number(document.getElementById("o1").value);
let b = Number(document.getElementById("o2").value);
let c = Number(document.getElementById("o3").value);

let sum = 1/a + 1/b + 1/c;

document.getElementById("result").innerHTML =
"倒数总和：" + sum.toFixed(4);

}

</script>

</body>
</html>
