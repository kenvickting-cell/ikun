<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>赔率整数计算器</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    max-width:450px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:18px;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
}

button{
    width:100%;
    background:#f5c542;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:18px;
    line-height:1.6;
}

.good{
    color:#00ff66;
}

.bad{
    color:#ff4444;
}
</style>

</head>

<body>

<h2>赔率整数计算器</h2>

<input id="o1" placeholder="输入赔率 1">
<input id="o2" placeholder="输入赔率 2">
<input id="o3" placeholder="输入赔率 3">

<button onclick="calculate()">
一键计算
</button>

<div id="result"></div>

<script>

// 最大公因数
function gcd(a,b){
    while(b){
        let t = b;
        b = a % b;
        a = t;
    }
    return a;
}

// 最小公倍数
function lcm(a,b){
    return a / gcd(a,b) * b;
}

// 取得赔率化简后的分子
function getNumerator(x){

    let str = x.toString();

    if(!str.includes(".")){
        return x;
    }

    let digits = str.split(".")[1].length;

    let denominator = Math.pow(10,digits);

    let numerator = x * denominator;

    let g = gcd(numerator, denominator);

    return numerator / g;
}

function calculate(){

    let o1 = parseFloat(document.getElementById("o1").value);
    let o2 = parseFloat(document.getElementById("o2").value);
    let o3 = parseFloat(document.getElementById("o3").value);

    // 检查输入
    if(!o1  !o2  !o3){
        document.getElementById("result").innerHTML =
        "<span class='bad'>请输入正确赔率</span>";
        return;
    }

    // 倒数总和
    let sum = 1/o1 + 1/o2 + 1/o3;

    // 理论收益率
    let profit = (1/sum - 1) * 100;

    let text = "";

    text += "倒数总和："
    + sum.toFixed(4)
    + "<br>";

    text += "理论收益率："
    + profit.toFixed(2)
    + "%<br><br>";

    // 判断套利
    if(sum < 1){

        // 求最低整数返还
        let n1 = getNumerator(o1);
        let n2 = getNumerator(o2);
        let n3 = getNumerator(o3);

        let R = lcm(lcm(n1,n2), n3);

        let b1 = R / o1;
        let b2 = R / o2;
        let b3 = R / o3;

        text += "<span class='good'>✅ 存在套利</span><br><br>";

        text += "最低整数下注：<br>";

        text += "赔率1："
        + b1 + "<br>";

        text += "赔率2："
        + b2 + "<br>";

        text += "赔率3："
        + b3 + "<br><br>";

        text += "统一返还："
        + R;

    }
    else{

        text +=
        "<span class='bad'>❌ 无套利机会</span>";

    }

    document.getElementById("result").innerHTML = text;

}

</script>

</body>
</html>
